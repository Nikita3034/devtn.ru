<!DOCTYPE html>
<html lang="en">
<head>
    <title>devtn.ru</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="terminal">

        <span class="resize-top"></span>

        <div class="bar">
            <div class="buttons">
                <div class="button red">
                    <div class="dot"></div>
                </div>
                <div class="button yellow">
                    <div class="dash"></div>
                </div>
                <div class="button green">
                    <div class="triangle1"></div>
                    <div class="triangle2"></div>
                </div>
            </div>
        </div>

        <div class="screen">
            <!-- <div class="info">
                hello
            </div> -->
        </div>

        <span class="resize-bottom"></span>

    </div>

    <div class="app-bar hide">
        <div class="icon">>_</div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
